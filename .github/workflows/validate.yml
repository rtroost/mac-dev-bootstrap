name: Validate

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  brewfile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Brewfile syntax
        run: brew bundle list --file=./Brewfile
