name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning

  brewfile:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Validate Brewfile syntax
        run: brew bundle list --file=./Brewfile
